<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Athlete Training Plan — June to October & Beyond</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #0d5c3a;
    --green-mid: #1a7a52;
    --green-bright: #2ea86e;
    --green-pale: #edf9f4;
    --amber: #e8870a;
    --amber-light: #fef3e0;
    --purple-light: #f0ecfc;
    --slate: #2d3748;
    --slate-mid: #4a5568;
    --slate-light: #718096;
    --bg: #f7f9f7;
    --white: #ffffff;
    --border: #e2e8f0;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--slate); min-height: 100vh; line-height: 1.6; }

  /* HERO */
  .hero { background: var(--green-deep); padding: 56px 32px 48px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 65% 0%, rgba(46,168,110,0.22) 0%, transparent 60%), radial-gradient(ellipse at 10% 100%, rgba(26,90,82,0.28) 0%, transparent 50%); pointer-events: none; }
  .hero-badge { display: inline-block; background: rgba(46,168,110,0.18); border: 1px solid rgba(46,168,110,0.38); color: #7ee8b8; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 14px; border-radius: 99px; margin-bottom: 20px; }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); color: #fff; line-height: 1.15; margin-bottom: 12px; position: relative; }
  .hero h1 em { font-style: italic; color: #7ee8b8; }
  .hero p { font-size: 15px; color: rgba(255,255,255,0.62); max-width: 520px; margin: 0 auto 32px; }
  .hero-stats { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; position: relative; }
  .hero-stat .num { display: block; font-family: 'DM Serif Display', serif; font-size: 2rem; color: #7ee8b8; line-height: 1; }
  .hero-stat .lbl { font-size: 11px; color: rgba(255,255,255,0.48); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

  /* TOP NAV — months row + tracker row */
  .nav-wrap { max-width: 920px; margin: 0 auto; padding: 28px 24px 0; }
  .top-tabs { display: flex; flex-direction: column; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .month-tabs-row { display: flex; }
  .tl-month { flex: 1; padding: 13px 8px; text-align: center; cursor: pointer; transition: all 0.18s; border-right: 1px solid var(--border); min-width: 0; }
  .tl-month:last-child { border-right: none; }
  .tl-month:hover { background: var(--green-pale); }
  .tl-month.active { background: var(--green-mid); color: white; }
  .tl-month .tl-name { font-size: 12px; font-weight: 600; display: block; }
  .tl-month .tl-phase { font-size: 9px; opacity: 0.62; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .tl-month .tl-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); margin: 5px auto 0; transition: background 0.2s; }
  .tl-month.active .tl-dot { background: #7ee8b8; }
  .tracker-tab { width: 100%; padding: 10px 20px; text-align: center; cursor: pointer; transition: all 0.18s; background: #f8f8f8; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .tracker-tab:hover { background: #fff3e0; }
  .tracker-tab.active { background: var(--amber); color: white; }
  .tracker-tab .tl-name { font-size: 12px; font-weight: 600; }
  .tracker-tab .tl-phase { font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.06em; }

  .main { max-width: 920px; margin: 0 auto; padding: 24px 24px 64px; }

  /* MONTH HEADER */
  .month-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; padding: 20px 24px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); border-left: 4px solid var(--green-bright); }
  .month-header-left h2 { font-family: 'DM Serif Display', serif; font-size: 1.7rem; color: var(--slate); line-height: 1.2; }
  .month-header-left .phase-tag { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 10px; border-radius: 99px; margin-top: 6px; }
  .month-header-left .focus-line { font-size: 13px; color: var(--slate-light); margin-top: 8px; max-width: 500px; line-height: 1.55; }
  .coach-tip { background: var(--green-pale); border: 1px solid rgba(46,168,110,0.2); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: var(--green-deep); max-width: 280px; line-height: 1.6; }
  .coach-tip strong { font-weight: 600; display: block; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--green-mid); }

  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate-light); margin-bottom: 10px; margin-top: 20px; }

  /* WEEK GRID */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--white); margin-bottom: 20px; width: 100%; }
  .wg-head { display: contents; }
  .wg-head span { background: var(--slate); color: rgba(255,255,255,0.68); text-align: center; padding: 8px 2px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; border-right: 1px solid rgba(255,255,255,0.07); }
  .wg-head span:last-child { border-right: none; }
  .wg-cell { padding: 8px 3px 9px; text-align: center; border-right: 1px solid var(--border); border-top: 1px solid var(--border); min-height: 110px; display: flex; flex-direction: column; align-items: center; gap: 2px; overflow: hidden; }
  .wg-cell:last-child { border-right: none; }
  .wg-cell.rest-day { background: #fafafa; }
  .wg-emoji { font-size: 16px; }
  .wg-main { font-size: 9.5px; color: var(--slate-mid); line-height: 1.25; font-weight: 500; word-break: break-word; }
  .wg-cardio { font-size: 8.5px; color: var(--green-mid); line-height: 1.25; margin-top: 1px; font-style: italic; word-break: break-word; }
  .wg-badge { font-size: 8px; font-weight: 600; padding: 2px 4px; border-radius: 99px; letter-spacing: 0.02em; text-transform: uppercase; margin-top: 2px; }


  .day-short { display: none; }
  .day-full { display: inline; }
  .daily-cardio-card { background: var(--white); border: 1px solid var(--border); border-top: 3px solid var(--green-bright); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 14px; }
  .dc-title { font-size: 12px; font-weight: 600; color: var(--green-deep); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .dc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; }
  .dc-item { background: var(--green-pale); border: 1px solid rgba(46,168,110,0.18); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 12px; color: var(--slate-mid); line-height: 1.45; }
  .dc-item .dc-day { font-weight: 600; color: var(--green-deep); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }

  /* WORKOUT CARDS */
  .cards-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-bottom: 14px; }
  .workout-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .wc-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .wc-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .wc-title { font-size: 13px; font-weight: 600; color: var(--slate); }
  .wc-sub { font-size: 11px; color: var(--slate-light); margin-top: 1px; }
  .wc-body { padding: 0 16px 14px; }
  .wc-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; color: var(--slate-mid); line-height: 1.45; }
  .wc-item:last-child { border-bottom: none; }
  .wc-dot-ind { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }

  /* PREHAB */
  .prehab-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .prehab-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: #faf8ff; }
  .prehab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
  .prehab-section { padding: 12px 16px; border-right: 1px solid var(--border); }
  .prehab-section:last-child { border-right: none; }
  .prehab-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--slate-light); margin-bottom: 8px; }
  .prehab-item { font-size: 12px; color: var(--slate-mid); padding: 4px 0; border-bottom: 1px solid var(--border); line-height: 1.45; }
  .prehab-item:last-child { border-bottom: none; }

  /* OUTDOOR */
  .outdoor-card { background: var(--amber-light, #fef3e0); border: 1px solid rgba(232,135,10,0.18); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 14px; }
  .oc-title { font-size: 12px; font-weight: 600; color: var(--amber); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { background: var(--white); border: 1px solid rgba(232,135,10,0.22); border-radius: 99px; padding: 4px 12px; font-size: 12px; color: var(--slate-mid); }

  /* RACE WEEK */
  .race-week-card { background: #fffbf0; border: 1px solid rgba(232,135,10,0.3); border-left: 4px solid var(--amber); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 14px; }
  .rw-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--amber); margin-bottom: 10px; }
  .rw-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 8px; }
  .rw-item { background: var(--white); border: 1px solid rgba(232,135,10,0.18); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 12px; color: var(--slate-mid); line-height: 1.45; }
  .rw-item .rw-day { font-weight: 600; color: #854F0B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }

  /* ONGOING BANNER */
  .ongoing-banner { background: var(--green-deep); border-radius: var(--radius); padding: 32px 28px; text-align: center; color: white; margin-top: 8px; }
  .ongoing-banner h3 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 10px; }
  .ongoing-banner p { font-size: 13.5px; color: rgba(255,255,255,0.68); line-height: 1.7; max-width: 540px; margin: 0 auto 20px; }
  .ongoing-banner .monthly-10k { display: inline-block; background: rgba(46,168,110,0.25); border: 1px solid rgba(126,232,184,0.4); color: #7ee8b8; font-size: 13px; font-weight: 600; padding: 10px 22px; border-radius: 99px; letter-spacing: 0.03em; }

  /* NAV BUTTONS */
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; flex-wrap: wrap; gap: 10px; }
  .nav-btn { background: var(--green-mid); color: white; border: none; padding: 10px 22px; border-radius: 99px; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s; }
  .nav-btn:hover { background: var(--green-deep); }
  .nav-btn.ghost { background: transparent; color: var(--slate-mid); border: 1px solid var(--border); }
  .nav-btn.ghost:hover { background: var(--bg); }

  /* ===== TRACKER ===== */
  .tracker-wrap { padding: 0; }
  .tracker-header { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px; border-left: 4px solid var(--amber); }
  .tracker-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--slate); }
  .tracker-header p { font-size: 13px; color: var(--slate-light); margin-top: 6px; line-height: 1.55; max-width: 560px; }
  .tracker-legend { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .tleg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--slate-mid); }
  .tleg-dot { width: 12px; height: 12px; border-radius: 50%; }

  .tracker-month-block { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  .tmb-header { padding: 12px 18px; background: var(--slate); color: white; display: flex; align-items: center; justify-content: space-between; }
  .tmb-header-left { display: flex; align-items: center; gap: 10px; }
  .tmb-title { font-size: 14px; font-weight: 600; }
  .tmb-phase { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.06em; }
  .tmb-progress { font-size: 12px; color: #7ee8b8; font-weight: 600; }

  .tracker-week { border-top: 1px solid var(--border); }
  .tracker-week-header { padding: 8px 18px; background: #f8faf8; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .twh-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--slate-light); }
  .twh-count { font-size: 11px; color: var(--green-mid); font-weight: 600; }

  .tracker-days { display: grid; grid-template-columns: repeat(7, 1fr); }
  .tracker-day { padding: 10px 6px; text-align: center; border-right: 1px solid var(--border); }
  .tracker-day:last-child { border-right: none; }
  .tracker-day.rest-bg { background: #fafafa; }
  .td-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--slate-light); margin-bottom: 6px; }
  .td-type { font-size: 9px; color: var(--slate-light); margin-bottom: 6px; line-height: 1.3; }
  .td-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid #cbd5e0;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    margin: 3px auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .td-dot:hover { border-color: var(--green-bright); background: var(--green-pale); }
  .td-dot.done { background: var(--green-bright); border-color: var(--green-bright); color: white; }
  .td-dot.done-rest { background: var(--amber); border-color: var(--amber); color: white; }
  .td-dot.done::after { content: '✓'; }
  .td-dot.done-rest::after { content: '✓'; }

  .tracker-summary { padding: 14px 18px; background: var(--green-pale); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .ts-stat { text-align: center; }
  .ts-num { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--green-deep); display: block; }
  .ts-label { font-size: 10px; color: var(--slate-light); text-transform: uppercase; letter-spacing: 0.06em; }
  .ts-bar-wrap { flex: 1; min-width: 120px; max-width: 300px; }
  .ts-bar-label { font-size: 10px; color: var(--slate-light); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .ts-bar-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .ts-bar-fill { height: 100%; background: var(--green-bright); border-radius: 99px; transition: width 0.3s; }
  .reset-btn { background: transparent; border: 1px solid rgba(232,135,10,0.3); color: var(--amber); font-size: 11px; padding: 4px 10px; border-radius: 99px; cursor: pointer; font-family: inherit; }
  .reset-btn:hover { background: var(--amber-light, #fef3e0); }

  @media (max-width: 680px) {
    .hero { padding: 40px 20px 36px; }
    .hero-stats { gap: 20px; }
    .month-header { flex-direction: column; }
    .coach-tip { max-width: 100%; }
    .prehab-grid { grid-template-columns: 1fr 1fr; }
    .dc-grid { grid-template-columns: 1fr; }
    .rw-grid { grid-template-columns: 1fr; }
    .tracker-days { grid-template-columns: repeat(7, 1fr); }
    .td-dot { width: 18px; height: 18px; font-size: 9px; }
    .tracker-tab { padding: 10px 8px; }
    .day-short { display: inline; }
    .day-full { display: none; }
    /* week grid — shrink everything to keep all 7 days on screen */
    .wg-head span { font-size: 7.5px; padding: 6px 1px; letter-spacing: 0; }
    .wg-cell { padding: 5px 2px 6px; min-height: 0; gap: 2px; }
    .wg-emoji { font-size: 13px; }
    .wg-main { font-size: 7.5px; line-height: 1.2; }
    .wg-cardio { font-size: 7px; display: none; }
    .wg-badge { font-size: 7px; padding: 1px 3px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">Youth Athlete · Age 10</div>
  <h1>The Start of a<br><em>Fit, Active Life</em></h1>
  <p>Bodyweight, bands & light dumbbells · Daily movement · Run/walk building to continuous running · June through October and well beyond</p>
  <div class="hero-stats">
    <div class="hero-stat"><span class="num">5</span><span class="lbl">Months</span></div>
    <div class="hero-stat"><span class="num">10K</span><span class="lbl">Monthly Goal</span></div>
    <div class="hero-stat"><span class="num">7</span><span class="lbl">Active Days</span></div>
    <div class="hero-stat"><span class="num">∞</span><span class="lbl">From Here</span></div>
  </div>
</div>

<div class="nav-wrap">
  <div class="top-tabs" id="top-tabs"></div>
</div>

<div class="main" id="main-content"></div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────
// trackData[monthIdx][weekIdx][dayIdx] = true/false
// Stored in localStorage as JSON string
const STORE_KEY = 'ytp_track_v1';
function loadTrack() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
}
function saveTrack(d) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch(e) {}
}
let trackData = loadTrack();
function getCell(mi, wi, di) {
  return !!(trackData[mi] && trackData[mi][wi] && trackData[mi][wi][di]);
}
function toggleCell(mi, wi, di) {
  if (!trackData[mi]) trackData[mi] = {};
  if (!trackData[mi][wi]) trackData[mi][wi] = {};
  trackData[mi][wi][di] = !trackData[mi][wi][di];
  saveTrack(trackData);
}
function resetMonth(mi) {
  trackData[mi] = {};
  saveTrack(trackData);
}

// ── DATA ──────────────────────────────────────────────────────────────────────
const MONTHS = [
  {
    name: "June", days: 30, phase: "Foundation", phaseColor: "#3B6D11", phaseBg: "#EAF3DE", accentColor: "#2ea86e",

    tip: "Every athlete starts from somewhere. The first few weeks of any training block aren't about fitness gains — they're about showing up. Consistency is the most important skill you can build right now. Keep it easy, keep it fun, and keep coming back. The body adapts quietly in the background even when it doesn't feel like much is happening.",
    raceWeek: null,
    strength: { sessions: "2× per week (Mon + Thu) — bodyweight only", flavor: "Focus entirely on form and controlled movement", items: ["Bodyweight squat — 2 sets × 10 reps (slow, 3 sec down)","Reverse lunge — 2 sets × 8 each leg","Incline push-up on a sturdy table — 2 sets × 8","Band pull-apart — 2 sets × 12","Band seated row (anchored) — 2 sets × 10","Dead bug hold — 2 sets × 20 sec each side","Glute bridge — 2 sets × 12"] },
    cardio: { sessions: "Structured cardio 2× (Tue + Fri) + light daily movement every day", flavor: "Run/walk intervals and easy bike rides", items: ["Structured session: Walk 5 min → Jog 1 min — repeat 4× → Walk 5 min cool-down","OR: Easy bike ride 20–25 min at a chatty, comfortable pace","Goal: ~1–1.5 km total jogging per session","Effort rule: you should be able to hold a full conversation while jogging"] },
    dailyCardio: [{day:"Monday",note:"5 min walk warm-up before strength session"},{day:"Tuesday",note:"Structured cardio — run/walk intervals (20–25 min)"},{day:"Wednesday",note:"15–20 min easy walk or gentle bike ride"},{day:"Thursday",note:"5 min walk warm-up before strength session"},{day:"Friday",note:"Structured cardio — easy bike or intervals (20–25 min)"},{day:"Saturday",note:"20–30 min easy walk, bike, or active outdoor play"},{day:"Sunday",note:"Rest day — 20 min gentle walk only. Nothing else."}],
    prehab: { ankle:["Ankle circles — 10 each direction × 2","Bilateral calf raise — 2 × 15","Single-leg balance hold — 20 sec each side"], hip:["Hip 90/90 stretch — 60 sec each side","Lying hip flexor stretch — 45 sec each leg","Clamshells bodyweight — 2 × 12 each"], shoulder:["Arm circles forward & backward — 10 each","Band pull-apart — 2 × 12","Doorway chest stretch — 30 sec × 2"], stretch:["Standing quad stretch — 30 sec each leg","Seated hamstring reach — 30 sec each leg","Child's pose — 45 sec","Chest & shoulder open — 30 sec"] },
    outdoor: ["Backyard games 45 min","Bike to a friend's house","Nature walk or trail explore","Playground & climbing structures","Swimming or water play","Active games with friends"],
    week: [
      {day:"Mon",emoji:"💪",main:"Strength + Prehab",cardio:"5 min warm-up walk",badge:"Strength",bc:"#185FA5",bb:"#E6F1FB",type:"strength"},
      {day:"Tue",emoji:"🏃",main:"Run/Walk Intervals",cardio:"20–25 min structured",badge:"Cardio",bc:"#3B6D11",bb:"#EAF3DE",type:"cardio"},

const WEEK_LABELS = ['Week 1','Week 2','Week 3','Week 4','Week 5'];
const N_WEEKS = 5;
let currentView = 'month'; // 'month' | 'tracker'
let currentMonth = 0;

// ── RENDER TOP TABS ───────────────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('top-tabs');
  wrap.innerHTML = '';

  // row 1: month tabs
  const monthRow = document.createElement('div');
  monthRow.className = 'month-tabs-row';
  MONTHS.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'tl-month' + (currentView === 'month' && currentMonth === i ? ' active' : '');
    div.innerHTML = `<span class="tl-name">${m.name}</span><span class="tl-phase">${m.phase}</span><div class="tl-dot"></div>`;
    div.onclick = () => { currentView = 'month'; currentMonth = i; render(); window.scrollTo({top:0,behavior:'smooth'}); };
    monthRow.appendChild(div);
  });
  wrap.appendChild(monthRow);

  // row 2: tracker tab spanning full width
  const tDiv = document.createElement('div');
  tDiv.className = 'tracker-tab' + (currentView === 'tracker' ? ' active' : '');
  tDiv.innerHTML = `<span class="tl-name">📋 Progress Tracker</span><span class="tl-phase">— tap to log completed days</span>`;
  tDiv.onclick = () => { currentView = 'tracker'; render(); window.scrollTo({top:0,behavior:'smooth'}); };
  wrap.appendChild(tDiv);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function addLabel(parent, text) {
  const el = document.createElement('p');
  el.className = 'section-label';
  el.textContent = text;
  parent.appendChild(el);
}

function monthCompletedDays(mi) {
  let c = 0;
  for (let w = 0; w < N_WEEKS; w++)
    for (let d = 0; d < 7; d++)
      if (getCell(mi, w, d)) c++;
  return c;
}

    rw.className = 'race-week-card';
    rw.innerHTML = `<div class="rw-title">${m.raceWeek.title}</div>
      <p style="font-size:12.5px;color:var(--slate-mid);margin-bottom:12px;line-height:1.55;">${m.raceWeek.note}</p>
      <div class="rw-grid">${m.raceWeek.days.map(d=>`<div class="rw-item"><div class="rw-day">${d.day}</div>${d.note}</div>`).join('')}</div>`;
    main.appendChild(rw);
  }

  // october ongoing banner
  if (mi === 4) {
    const banner = document.createElement('div');
    banner.className = 'ongoing-banner';
    banner.innerHTML = `<h3>This is just the beginning</h3>
      <p>Five months of consistent work has built something real — strength, endurance, a daily movement habit, and the confidence that comes from doing hard things. Keep the same weekly rhythm going into November and beyond. One 10K a month is the new goal post, not a finish line.</p>
      <span class="monthly-10k">🏅 One 10K per month — every month from here</span>`;
    main.appendChild(banner);
  }

  // nav
  const nav = document.createElement('div');
  nav.className = 'nav-row';
  nav.innerHTML = mi > 0
    ? `<button class="nav-btn ghost" onclick="goMonth(${mi-1})">← ${MONTHS[mi-1].name}</button>`
    : `<span></span>`;
  if (mi < MONTHS.length - 1)
    nav.innerHTML += `<button class="nav-btn" onclick="goMonth(${mi+1})">Next: ${MONTHS[mi+1].name} →</button>`;
  main.appendChild(nav);
}

function goMonth(i) { currentView='month'; currentMonth=i; render(); window.scrollTo({top:0,behavior:'smooth'}); }

// ── RENDER TRACKER VIEW ───────────────────────────────────────────────────────
function renderTrackerView() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'tracker-header';
  hdr.innerHTML = `<h2>📋 Weekly Progress Tracker</h2>
    <p>Tap any circle to mark that day as complete for that week. Up to 5 weeks tracked per month. Green = workout done · Orange = rest day walk done.</p>
    <div class="tracker-legend">
      <div class="tleg-item"><div class="tleg-dot" style="background:#2ea86e;"></div>Day completed</div>
      <div class="tleg-item"><div class="tleg-dot" style="background:#e8870a;"></div>Rest day walk done</div>
      <div class="tleg-item"><div class="tleg-dot" style="background:#e2e8f0;border:1.5px solid #cbd5e0;"></div>Not yet done</div>
    </div>`;
  main.appendChild(hdr);

  MONTHS.forEach((m, mi) => {
    const totalPossible = m.days;
    const completed = monthCompletedDays(mi);
    const pct = Math.round((completed / totalPossible) * 100);

    const block = document.createElement('div');
    block.className = 'tracker-month-block';

    // block header
    const bh = document.createElement('div');
    bh.className = 'tmb-header';
    bh.innerHTML = `<div class="tmb-header-left">
        <div>
          <div class="tmb-title">${m.name}</div>
          <div class="tmb-phase">${m.phase}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="text-align:right;">
          <div class="tmb-progress" data-month-progress="${mi}">${completed} / ${totalPossible} days</div>
          <div style="font-size:9px;opacity:0.5;text-transform:uppercase;letter-spacing:.06em;" data-month-pct="${mi}">${pct}% complete</div>
        </div>
        <button class="reset-btn" onclick="doReset(${mi})">Reset</button>
      </div>`;
    block.appendChild(bh);

    // progress bar
    const pbWrap = document.createElement('div');
    pbWrap.style = 'padding:10px 18px 0;background:#f8faf8;border-bottom:1px solid var(--border);';
    pbWrap.innerHTML = `<div class="ts-bar-track" style="margin-bottom:10px;"><div class="ts-bar-fill" data-month-bar="${mi}" style="width:${pct}%;"></div></div>`;
    block.appendChild(pbWrap);

    // weeks
    for (let wi = 0; wi < N_WEEKS; wi++) {
      const weekDone = m.week.filter((_, di) => getCell(mi, wi, di)).length;
      const wSection = document.createElement('div');
      wSection.className = 'tracker-week';

      const wHdr = document.createElement('div');
      wHdr.className = 'tracker-week-header';
      wHdr.innerHTML = `<span class="twh-label">${WEEK_LABELS[wi]}</span><span class="twh-count" data-week-count="${mi}-${wi}">${weekDone}/7 days</span>`;
      wSection.appendChild(wHdr);

      const daysRow = document.createElement('div');
      daysRow.className = 'tracker-days';
      m.week.forEach((d, di) => {
        const dd = document.createElement('div');
        dd.className = 'tracker-day' + (d.rest ? ' rest-bg' : '');
        const done = getCell(mi, wi, di);
        const dotClass = done ? (d.rest ? 'td-dot done-rest' : 'td-dot done') : 'td-dot';
        dd.innerHTML = `<div class="td-name">${d.day}</div>
          <div class="td-type">${d.badge}</div>
          <div class="${dotClass}" data-cell="${mi}-${wi}-${di}" onclick="doToggle(${mi},${wi},${di})"></div>`;
        daysRow.appendChild(dd);
      });
      wSection.appendChild(daysRow);
      block.appendChild(wSection);
    }

    main.appendChild(block);
  });

  // overall summary
  const total = MONTHS.reduce((s, m) => s + m.days, 0);
  const allDone = MONTHS.reduce((s, _, mi) => s + monthCompletedDays(mi), 0);
  const overallPct = Math.round((allDone / total) * 100);
  const summCard = document.createElement('div');
  summCard.style = 'background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-top:4px;';
  summCard.innerHTML = `<p class="section-label" style="margin-top:0;">Overall 5-month progress</p>
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:8px;">
      <div class="ts-stat"><span class="ts-num" id="overall-done">${allDone}</span><span class="ts-label">Days logged</span></div>
      <div class="ts-stat"><span class="ts-num" id="overall-rem">${total - allDone}</span><span class="ts-label">Days remaining</span></div>
      <div class="ts-stat"><span class="ts-num" id="overall-pct">${overallPct}%</span><span class="ts-label">Complete</span></div>
      <div class="ts-bar-wrap">
        <div class="ts-bar-label"><span>Progress</span><span>${allDone}/${total}</span></div>
        <div class="ts-bar-track"><div class="ts-bar-fill" id="overall-bar" style="width:${overallPct}%;"></div></div>
      </div>
    </div>`;
  main.appendChild(summCard);
}

function doToggle(mi, wi, di) {
  toggleCell(mi, wi, di);
  const done = getCell(mi, wi, di);
  const isRest = MONTHS[mi].week[di].rest;
  // update just the clicked dot
  const dotEl = document.querySelector(`[data-cell="${mi}-${wi}-${di}"]`);
  if (dotEl) {
    dotEl.className = done ? (isRest ? 'td-dot done-rest' : 'td-dot done') : 'td-dot';
  }
  // update the week count for this week row
  const weekDone = MONTHS[mi].week.filter((_, d2) => getCell(mi, wi, d2)).length;
  const whEl = document.querySelector(`[data-week-count="${mi}-${wi}"]`);
  if (whEl) whEl.textContent = `${weekDone}/7 days`;
  // update month progress bar and count
  const completed = monthCompletedDays(mi);
  const totalPossible = MONTHS[mi].days;
  const pct = Math.round((completed / totalPossible) * 100);
  const progEl = document.querySelector(`[data-month-progress="${mi}"]`);
  if (progEl) { progEl.textContent = `${completed} / ${totalPossible} days`; }
  const pctEl = document.querySelector(`[data-month-pct="${mi}"]`);
  if (pctEl) { pctEl.textContent = `${pct}% complete`; }
  const barEl = document.querySelector(`[data-month-bar="${mi}"]`);
  if (barEl) { barEl.style.width = pct + '%'; }
  // update overall summary
  const allDone = MONTHS.reduce((s, _, m2) => s + monthCompletedDays(m2), 0);
  const total = MONTHS.reduce((s, m2) => s + m2.days, 0);
  const overallPct = Math.round((allDone / total) * 100);
  const ovDone = document.getElementById('overall-done');
  const ovRem = document.getElementById('overall-rem');
  const ovPct = document.getElementById('overall-pct');
  const ovBar = document.getElementById('overall-bar');
  if (ovDone) ovDone.textContent = allDone;
  if (ovRem) ovRem.textContent = total - allDone;
  if (ovPct) ovPct.textContent = overallPct + '%';
  if (ovBar) ovBar.style.width = overallPct + '%';
}

function doReset(mi) {
  if (confirm(`Reset all tracking for ${MONTHS[mi].name}?`)) { resetMonth(mi); renderTrackerView(); }
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  renderTabs();
  if (currentView === 'tracker') {
    renderTrackerView();
  } else {
    renderMonthView();
  }
}

render();
</script>
</body>
</html>
